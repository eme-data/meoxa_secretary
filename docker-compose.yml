services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meoxa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: meoxa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: meoxa-backend
    restart: unless-stopped
    env_file: .env
    environment:
      HF_HOME: /var/lib/meoxa/huggingface
    volumes:
      - ./backend:/app
      - meoxa_data:/var/lib/meoxa
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn meoxa_secretary.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: meoxa-worker
    restart: unless-stopped
    env_file: .env
    environment:
      HF_HOME: /var/lib/meoxa/huggingface
    volumes:
      - ./backend:/app
      - meoxa_data:/var/lib/meoxa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A meoxa_secretary.workers.celery_app worker --loglevel=info

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: meoxa-scheduler
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A meoxa_secretary.workers.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: meoxa-frontend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  postgres_data:
  meoxa_data:
