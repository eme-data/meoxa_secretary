# Reverse proxy pour GlitchTip — à copier dans
# /opt/meoxa_secretary/infra/nginx/conf.d/glitchtip.conf
# puis redémarrer le conteneur nginx.

server {
    listen 80;
    server_name errors.meoxa.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name errors.meoxa.app;

    ssl_certificate /etc/letsencrypt/live/errors.meoxa.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/errors.meoxa.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    location / {
        # GlitchTip est exposé en 127.0.0.1:8001 par le compose gt.
        # Depuis le conteneur nginx, on adresse l'host via host.docker.internal
        # (à ajouter dans docker-compose.prod.yml section nginx :
        #    extra_hosts: ["host.docker.internal:host-gateway"])
        proxy_pass http://host.docker.internal:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
