# Domaine de production : secretary.meoxa.app
# Avant d'activer le bloc HTTPS, obtenir les certificats :
#   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#       --webroot -w /var/www/certbot -d secretary.meoxa.app \
#       --email mathieu@mdoservices.fr --agree-tos

server {
    listen 80;
    server_name secretary.meoxa.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name secretary.meoxa.app;

    ssl_certificate /etc/letsencrypt/live/secretary.meoxa.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secretary.meoxa.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Resolver Docker embarqué — force nginx à re-résoudre les noms de services
    # à chaque requête, évite le 502 quand un backend/frontend est recréé (IP change).
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream/docs;
        proxy_set_header Host $host;
    }

    location / {
        set $frontend_upstream "http://frontend:3000";
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
