name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose*.yml"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose*.yml"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  # Valeurs fictives suffisantes pour importer l'app en CI.
  JWT_SECRET: ci-jwt-secret-placeholder-32bytes-ok
  SETTINGS_ENCRYPTION_KEY: "YBlDi6jDwBc4NwfHbDjKoL8Gkaz7cZzLpzhQGQMLH8c="
  DATABASE_URL: postgresql+psycopg://meoxa:meoxa@localhost:5432/meoxa_test
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/1
  CELERY_RESULT_BACKEND: redis://localhost:6379/2
  ENVIRONMENT: test
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        working-directory: backend
        run: ruff check meoxa_secretary
      - name: Ruff format (verify)
        working-directory: backend
        run: ruff format --check meoxa_secretary

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: meoxa
          POSTGRES_PASSWORD: meoxa
          POSTGRES_DB: meoxa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meoxa"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Alembic upgrade head (migrations valides)
        working-directory: backend
        run: alembic upgrade head
      - name: Pytest
        working-directory: backend
        run: pytest -q --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image (prod target) — sans push
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: meoxa-backend:ci
