name: security

on:
  schedule:
    # Tous les lundis à 06:00 UTC (08:00 heure de Paris l'été).
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Résolution des dépendances backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Scan CVE (backend)
        working-directory: backend
        run: pip-audit --strict --desc

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps frontend
        working-directory: frontend
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Scan CVE (frontend)
        working-directory: frontend
        # `--audit-level=high` ignore les low/moderate pour éviter les false-positives.
        run: npm audit --audit-level=high

  open-issue-on-failure:
    runs-on: ubuntu-latest
    needs: [pip-audit, npm-audit]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Ouvre une issue de sécurité
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Vulnérabilité détectée par le scan hebdo (${new Date().toISOString().slice(0,10)})`,
              body: `Un ou plusieurs des scans sécurité ont échoué.\n\nVoir le run : ${runUrl}\n\nActions : examiner les rapports pip-audit/npm-audit et mettre à jour les dépendances concernées (ou laisser Dependabot ouvrir les PRs).`,
              labels: ["security"]
            });
